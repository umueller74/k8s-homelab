# helmrelease-traefik.yaml - Traefik deployment via Flux
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 15m
  chart:
    spec:
      chart: traefik
      version: '41.x'
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
      interval: 15m
  install:
    createNamespace: true
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    api:
      dashboard: true

    # Deployment configuration
    deployment:
      replicas: 1
      securityContext:
        fsGroup: 65532 # Allows the Traefik pod to write to the persistent volume

    # Resource limits
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

    # Entrypoints configuration
    ports:
      web:
        port: 8000
        exposedPort: 80
        protocol: TCP
      websecure:
        port: 8443
        exposedPort: 443
        protocol: TCP
#        tls:
#          enabled: true

    providers:
      kubernetesIngress:
        enabled: true

      kubernetesGateway:
        enabled: false

    # Service configuration
    service:
      type: LoadBalancer
      annotations: {}

    # Enable the Traefik dashboard (secured)
    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.homelab.cs-ol.de`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
        entryPoints:
          - websecure

    ingressClass:
      enabled: true
      isDefaultClass: true

    # Logging configuration
    log:
      level: INFO
    accessLog:
      enabled: true
      format: json

    # Prometheus metrics
    metrics:
      prometheus:
        entryPoint: metrics
        service:
          enabled: true
        serviceMonitor:
          enabled: false

    # Pod disruption budget for high availability
    podDisruptionBudget:
      enabled: true
      minAvailable: 1

    # Node affinity for spreading across nodes
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: traefik
    # Snippet: Let's Encrypt TLS configuration in Traefik values
    additionalArguments:
      - '--certificatesresolvers.letsencrypt.acme.email=info@cs-ol.de'
      - '--certificatesresolvers.letsencrypt.acme.storage=/data/acme.json'
      - '--certificatesresolvers.letsencrypt.acme.tlschallenge=true'

    persistence:
      enabled: true
      size: 128Mi
      path: /data
