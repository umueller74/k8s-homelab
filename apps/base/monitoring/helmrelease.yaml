# clusters/my-cluster/monitoring/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 15m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '>=84.0.0 <85.0.0'
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # Prometheus configuration
    prometheus:
      prometheusSpec:
        # Retain 30 days of metrics
        retention: 10d
        retentionSize: '10GB'
        # Persistent storage for Prometheus data
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: fast-ssd
              accessModes: ['ReadWriteOnce']
              resources:
                requests:
                  storage: 10Gi
        # Scrape all ServiceMonitors and PodMonitors across namespaces
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorNamespaceSelector: {}
        ruleSelectorNilUsesHelmValues: false
        ruleNamespaceSelector: {}

    # Grafana configuration
    grafana:
      enabled: true
      adminPassword: 'admin' # Override with SOPS Secret in production
      persistence:
        enabled: true
        size: 10Gi
      ingress:
        enabled: true
        hosts:
          - grafana.homelab.cs-ol.de

    # Alertmanager configuration with Slack routing
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: fast-ssd
              accessModes: ['ReadWriteOnce']
              resources:
                requests:
                  storage: 5Gi
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ['job']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - match:
                alertname: InstanceLowMemory2
                severity: critical
              receiver: 'null'
            - match:
              receiver: 'discord_webhook'
              continue: true
        receivers:
          - name: 'null'
          - name: 'discord_webhook'
            webhook_configs:
              - url: 'http://alertmanager-discord:9094'
