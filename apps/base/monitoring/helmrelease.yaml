apiVersion: helm.toolkit.fluxcd.io/v1beta2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 1h
  chart:
    spec:
      chart: kube-prometheus-stack
      version: '60.x.x' # Use the specific version you need
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # prometheus-values.yaml
    server:
      # Persistent storage for metrics
      persistentVolume:
        enabled: true
        size: 50Gi

      # Retention settings
      retention: '30d'

      # Resource allocation
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2
          memory: 4Gi

      # Service configuration
      service:
        type: NodePort
        nodePort: 30090

      # Global scrape interval
      global:
        scrape_interval: 15s
        evaluation_interval: 15s

    # Enable node-exporter for node metrics
    prometheus-node-exporter:
      enabled: true

    # Enable kube-state-metrics for Kubernetes object metrics
    kube-state-metrics:
      enabled: true

    # Alertmanager configuration
    alertmanager:
      enabled: true
      persistence:
        enabled: true
        size: 5Gi

    # Push gateway for batch jobs
    prometheus-pushgateway:
      enabled: false
