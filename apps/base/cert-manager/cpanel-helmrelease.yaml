apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager-cpanel-webhook
  namespace: cert-manager

spec:
  interval: 30m

  chart:
    spec:
      chart: cert-manager-cpanel-dns-webhook
      version: 1.0.5
      sourceRef:
        kind: HelmRepository
        name: egeback
        namespace: flux-system

  values:
    cert-manager:
      enabled: false

    certManager:
      namespace: cert-manager
