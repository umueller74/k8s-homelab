apiVersion: cert-manager.io/v1
kind: ClusterIssuer

metadata:
  name: letsencrypt-production

spec:
  acme:
    email: info@cs-ol.de

    server: https://acme-v02.api.letsencrypt.org/directory

    privateKeySecretRef:
      name: letsencrypt-production

    solvers:
      - dns01:
          webhook:
            groupName: jameslakin.co.uk

            solverName: cpanel-solver

            config:
              cpanelUrl: https://www.cs-ol.de:2083
              secretRef: cert-manager/cpanel-api
