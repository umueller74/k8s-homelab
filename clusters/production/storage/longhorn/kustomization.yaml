# clusters/production/storage/longhorn/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - storageclass.yaml
  - ingressroute.yaml

patches:
  - target:
      version: v1
      kind: Node
    patch: |-
      apiVersion: v1
      kind: Node
      metadata:
        labels:
          node.longhorn.io/create-default-disk: "config"
        annotations:
          node.longhorn.io/default-disks-config: '[{"path":"/var/lib/longhorn","allowScheduling":true},{"path":"/var/mnt/storage","allowScheduling":true}]'
