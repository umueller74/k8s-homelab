# clusters/production/storage/longhorn-kustomization.yaml
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/production/storage/longhorn
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: longhorn
      namespace: longhorn-system
  timeout: 20m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-config
  namespace: flux-system
spec:
  dependsOn:
    - name: longhorn
  interval: 10m
  path: ./clusters/production/storage/longhorn-config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  -  # your standard node/cluster definitions

patches:
  - target:
      version: v1
      kind: Node
      # Note: Leaving 'name' blank instructs Kustomize to patch EVERY node object it tracks!
    patch: |-
      apiVersion: v1
      kind: Node
      metadata:
        labels:
          # Tells Longhorn this node accepts default disk assignments
          node.longhorn.io/create-default-disk: "config" 
        annotations:
          # A JSON string array declaring both the system disk and your extra Talos disk
          node.longhorn.io/default-disks-config: '[
            {
              "path": "/var/lib/longhorn",
              "allowScheduling": true
            },
            {
              "path": "/var/mnt/storage",
              "allowScheduling": true
            }
          ]'
