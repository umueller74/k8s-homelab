apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: metallb-config
  namespace: flux-system

spec:
  dependsOn:
    - name: metallb

  interval: 10m
  path: ./infrastructure/metallb/config
  prune: true
  wait: true

  sourceRef:
    kind: GitRepository
    name: flux-system

  timeout: 5m
