apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: flux-system

spec:
  interval: 30m

  releaseName: metallb

  targetNamespace: metallb-system

  chart:
    spec:
      chart: metallb
      version: '0.15.x'

      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system

  install:
    createNamespace: false
    remediation:
      retries: 3
    crds: CreateReplace

  upgrade:
    remediation:
      retries: 3
    crds: CreateReplace

  rollback:
    cleanupOnFail: true

  uninstall:
    keepHistory: false

  values:
    controller:
      logLevel: info

    speaker:
      logLevel: debug

      frr:
        enabled: false

    frrk8s:
      enabled: false
