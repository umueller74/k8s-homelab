# clusters/production/storage/longhorn/helmrelease.yaml
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metrics-server
  namespace: metrics-system
spec:
  interval: 30m
  chart:
    spec:
      chart: metrics-server
      version: '3.13.x'
      sourceRef:
        kind: HelmRepository
        name: metrics-server
        namespace: flux-system
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  timeout: 15m
  values:
    args:
      - --kubelet-insecure-tls
      - --kubelet-preferred-address-types=InternalIP
    metrics:
      enabled: false
    serviceMonitor:
      enabled: false